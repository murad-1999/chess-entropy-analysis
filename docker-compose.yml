services:
  chess-vision-dark:
    build:
      context: ./services/chess-vision-dark
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - entropy-service
    networks:
      - chess-network

  engine-service:
    build:
      context: ./services/engine-service
    ports:
      - "8000:8000"
    networks:
      - chess-network

  entropy-service:
    build:
      context: ./services/entropy-service
    ports:
      - "8001:8001"
    volumes:
      - ./services/entropy-service:/app
    environment:
      - ENGINE_API_URL=http://engine-service:8000/analyze
    depends_on:
      - engine-service
    networks:
      - chess-network

networks:
  chess-network:
    driver: bridge
