services:
  chess-vision-dark:
    build:
      context: ./services/chess-vision-dark
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    networks:
      - chess-network

  engine-service:
    build:
      context: ./services/engine-service
    ports:
      - "8000:8000"
    networks:
      - chess-network

networks:
  chess-network:
    driver: bridge
